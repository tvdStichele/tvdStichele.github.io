<!DOCTYPE html>
<html>
<head>
  <title>My Personal Website</title>
  <style>
    /* CSS for the side navigation */
    .sidenav {
      height: 100%;
      width: 170px;
      position: fixed;
      z-index: 1;
      top: 0;
      left: 0;
      background-color: #f1f1f1;
      overflow-x: hidden;
      padding-top: 70px;
      font-family: 'Avenir', sans-serif;
    }

    /* CSS for the side navigation links */
    .sidenav a {
      padding: 6px 8px 6px 16px;
      text-decoration: none;
      font-size: 18px;
      color: #818181;
      display: block;
    }

    /* CSS for the side navigation links on hover */
    .sidenav a:hover {
      color: #000000;
    }

    /* CSS for the central content */
    .content {
      margin-left: 200px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: left;
      justify-content: center;
      height: 30vh;
      font-family: 'Avenir', sans-serif;
    }
    
    /* CSS for the top navigation */
    .topnav {
      background-color: #333;
      overflow: hidden;
      z-index: 2;
      position: fixed;
      width: 100%;
    }

    /* CSS for the top navigation links */
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    /* CSS for the top navigation links on hover */
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    /* CSS for the active top navigation link */
    .topnav a.active {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>
  <div class="topnav">
    <a class="active" href="#">Home</a>
    <a> Reading</a>
  </div>
  
  <div class="sidenav">
    <a href="mailto:Vanderstichele.Thomas2@gmail.com">Email</a>
    <a href="https://twitter.com/TVanderstichele">Twitter</a>
    <a href="https://www.linkedin.com/in/thomas-vanderstichele-68b916135/">LinkedIn</a>
    <a href="https://github.com/tvdStichele">GitHub</a>
    <a href="https://scholar.google.com/citations?user=CLTUdzMAAAAJ&hl=en&authuser=1&oi=ao">Google Scholar</a>
  </div>
  
  <div class="content">
    <h1>Thomas Vanderstichele</h1>
    <p>
      Insert your homepage content here.
    </p>
  </div>
</body>
</html>
