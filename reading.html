<!DOCTYPE html>
<html>
<head>
  <title>My Personal Website - Reading</title>
  <style>
    /* CSS for the side navigation */
    .sidenav {
      height: 100%;
      width: 200px;
      position: fixed;
      z-index: 1;
      top: 0;
      left: 0;
      background-color: #f1f1f1;
      overflow-x: hidden;
      padding-top: 20px;
    }

    /* CSS for the side navigation links */
    .sidenav a {
      padding: 6px 8px 6px 16px;
      text-decoration: none;
      font-size: 18px;
      color: #818181;
      display: block;
    }

    /* CSS for the side navigation links on hover */
    .sidenav a:hover {
      color: #000000;
    }

    /* CSS for the central content */
    .content {
      margin-left: 200px;
      padding: 20px;
    }
    
    /* CSS for the top navigation */
    .topnav {
      background-color: #333;
      overflow: hidden;
    }

    /* CSS for the top navigation links */
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    /* CSS for the top navigation links on hover */
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }
    
    /* CSS for the active top navigation link */
    .topnav a.active {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="index.html">Home</a>
    <a class="active" href="#">Reading</a>
  </div>
  
  <div class="sidenav">
    <a href="mailto:your-email@example.com">Email</a>
    <a href="https://twitter.com/your-twitter-account">Twitter</a>
    <a href="https://linkedin.com/in/your-linkedin-account">LinkedIn</a>
    <a href="https://github.com/your-github-page">GitHub</a>
    <a href="https://scholar.google.com/citations?user=your-google-scholar-id">Google Scholar</a>
  </div>
  
  <div class="content">
    <h1>Reading</h1>
    <ul>
      <li>Book 1</li>
      <li>Book 2</li>
      <li>Book 3</li>
      <!-- Add more books as needed -->
    </ul>
  </div>
</body>
</html>
